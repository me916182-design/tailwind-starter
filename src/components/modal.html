<!--
  MODAL COMPONENT
  ================
  Модальное окно с затемнением фона
  
  Использование:
  - Кнопка: data-modal-open="modal-id"
  - Закрытие: data-modal-close="modal-id" или клик вне контента
-->

<div id="modal" class="modal fixed inset-0 z-50 hidden" role="dialog" aria-modal="true">
  <!-- Затемнение фона -->
  <div class="modal-overlay absolute inset-0 bg-black/50 opacity-0 transition-opacity duration-300"></div>

  <!-- Контент модального окна -->
  <div class="modal-container flex min-h-full items-center justify-center p-4">
    <div
      class="modal-content relative w-full max-w-lg transform rounded-xl bg-white p-6 shadow-2xl opacity-0 scale-95 transition-all duration-300"
    >
      <!-- Заголовок с кнопкой закрытия -->
      <div class="mb-4 flex items-center justify-between">
        <h3 class="font-heading text-2xl font-bold text-gray-900">Заголовок модального окна</h3>
        <button
          data-modal-close
          class="rounded-lg p-2 text-gray-500 transition-colors hover:bg-gray-100 hover:text-gray-700"
          aria-label="Закрыть"
        >
          <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12"
            />
          </svg>
        </button>
      </div>

      <!-- Тело модального окна -->
      <div class="modal-body text-gray-600">
        <p>
          Это пример модального окна. Здесь может быть любой контент: формы, изображения, текст и
          т.д.
        </p>
      </div>

      <!-- Футер с кнопками -->
      <div class="mt-6 flex justify-end gap-3">
        <button
          data-modal-close
          class="btn-secondary rounded-lg px-4 py-2"
        >
          Отмена
        </button>
        <button class="btn-primary rounded-lg px-4 py-2">
          Подтвердить
        </button>
      </div>
    </div>
  </div>
</div>
